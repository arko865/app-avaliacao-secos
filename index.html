<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação de Inventário</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f8;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

h2{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.motivos{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
gap:6px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#2d7ef7;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5fcc;
}

.fotos{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
gap:8px;
margin-top:10px;
}

.fotos img{
width:100%;
border-radius:6px;
}

.aprovado{
background:#cfead6;
color:#1d6b38;
font-weight:bold;
padding:12px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>1. Informe as quantidades avaliadas</h2>

<div class="grid">

<label>PLT MIX
<input type="number" id="pltMix">
</label>

<label>PLT FULL
<input type="number" id="pltFull">
</label>

<label>PAR
<input type="number" id="par">
</label>

<label>PRATELEIRAS
<input type="number" id="prateleiras">
</label>

<label>GANCHEIRAS
<input type="number" id="gancheiras">
</label>

<label>PONTAS
<input type="number" id="pontas">
</label>

<label>CAIXARIA
<input type="number" id="caixaria">
</label>

<label>VITRINE
<input type="number" id="vitrine">
</label>

</div>

</div>

<div class="card">

<h2>2. Não conformidades</h2>

<label>Áreas não conformes
<input type="number" id="areasNC">
</label>

<div class="motivos">

<label><input type="checkbox" value="1"> 1 - Paletes Mix com produtos de mais de uma categoria</label>
<label><input type="checkbox" value="2"> 2 - Caixas abertas / mescladas</label>
<label><input type="checkbox" value="3"> 3 - Paletes da mesma categoria em vários corredores</label>
<label><input type="checkbox" value="4"> 4 - Paletes Full sem placa</label>
<label><input type="checkbox" value="5"> 5 - PAR sem agrupamento correto</label>
<label><input type="checkbox" value="6"> 6 - Paletes Mix não organizados</label>
<label><input type="checkbox" value="7"> 7 - Caixas atrás dos produtos</label>
<label><input type="checkbox" value="8"> 8 - Caixarias desorganizadas</label>
<label><input type="checkbox" value="9"> 9 - Produtos não puxados</label>
<label><input type="checkbox" value="10"> 10 - Produtos não agrupados</label>
<label><input type="checkbox" value="11"> 11 - Produtos sem espaço</label>
<label><input type="checkbox" value="12"> 12 - Produtos em posições diferentes</label>
<label><input type="checkbox" value="13"> 13 - Pontas desorganizadas</label>
<label><input type="checkbox" value="14"> 14 - Peg board desorganizado</label>
<label><input type="checkbox" value="15"> 15 - PAR bebidas incorretas</label>
<label><input type="checkbox" value="16"> 16 - Vitrines desorganizadas</label>

</div>

</div>

<div class="card">

<h2>3. Registro fotográfico</h2>

<input type="file" accept="image/*" capture="environment" id="camera">

<div class="fotos" id="galeria"></div>

</div>

</div>

<script>

const camera = document.getElementById("camera");
const galeria = document.getElementById("galeria");

camera.addEventListener("change", function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

const img = document.createElement("img");
img.src = e.target.result;

galeria.appendChild(img);

};

reader.readAsDataURL(file);

}

});

</script>

</body>
</html>
