<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliação de Inventário</title>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --green-bg: #dcfce7;
      --green-text: #14532d;
      --red-bg: #7f1d1d;
      --red-text: #ffffff;
      --soft: #f1f5f9;
      --primary: #0f172a;
      --primary-hover: #1e293b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 16px;
    }

    .layout {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      gap: 24px;
      grid-template-columns: 1.35fr 0.65fr;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    .card-header {
      padding: 18px 20px 0;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .card-content {
      padding: 0 20px 20px;
    }

    .grid-2 {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #fff;
      font-size: 14px;
      color: var(--text);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .checkbox-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--soft);
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 600;
    }

    .section-title {
      margin: 28px 0 14px;
      font-size: 22px;
      font-weight: 700;
    }

    .item-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      background: #fff;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--soft);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    .score-text {
      font-size: 18px;
      font-weight: 700;
    }

    .item-description {
      font-size: 14px;
      line-height: 1.45;
      margin: 0 0 14px;
    }

    .option-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .option-button {
      border: 1px solid #cbd5e1;
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      line-height: 1.35;
    }

    .option-button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
    }

    .btn:hover { background: var(--primary-hover); }

    .sticky-col {
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .status-box {
      border-radius: 18px;
      padding: 18px 16px;
      text-align: center;
    }

    .status-good {
      background: var(--green-bg);
      color: var(--green-text);
    }

    .status-bad {
      background: var(--red-bg);
      color: var(--red-text);
    }

    .status-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-score {
      margin-top: 8px;
      font-size: 34px;
      font-weight: 700;
    }

    .status-text {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .summary-tile {
      background: var(--soft);
      border-radius: 16px;
      padding: 14px;
    }

    .summary-tile-label {
      font-size: 12px;
      color: var(--muted);
    }

    .summary-tile-value {
      margin-top: 6px;
      font-size: 28px;
      font-weight: 700;
    }

    .approval-box {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .approval-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .approval-line {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .scroll-wrap {
      max-height: 520px;
      overflow: auto;
      padding-right: 4px;
    }

    .item-summary-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .item-summary-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .item-summary-id {
      font-size: 14px;
      font-weight: 700;
    }

    .item-summary-desc {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .item-summary-score {
      min-width: 96px;
      border-radius: 12px;
      padding: 10px 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .sticky-col { position: static; }
    }

    @media (max-width: 700px) {
      .grid-2, .summary-grid { grid-template-columns: 1fr; }
      .page { padding: 10px; }
      .card-header { padding: 16px 16px 0; }
      .card-content { padding: 0 16px 16px; }
      .section-title { font-size: 18px; }
      .card-title { font-size: 22px; }
      .status-score { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="layout">
      <div>
        <div class="card">
          <div class="card-header">
            <h1 class="card-title">Avaliação de Inventário</h1>
          </div>
          <div class="card-content">
            <div class="grid-2">
              <div class="field">
                <label for="nomeLoja">Nome da loja</label>
                <input id="nomeLoja" type="text" />
              </div>
              <div class="field">
                <label for="visita">Visita</label>
                <input id="visita" type="text" value="1ª Visita" />
              </div>
              <div class="field">
                <label for="coordArko">Coord. Arko</label>
                <input id="coordArko" type="text" />
              </div>
              <div class="field">
                <label for="gerenteLoja">Gerente da loja</label>
                <input id="gerenteLoja" type="text" />
              </div>
              <div class="field">
                <label for="data">Data</label>
                <input id="data" type="date" />
              </div>
              <div class="field">
                <label for="horaVisita">Hora da visita</label>
                <input id="horaVisita" type="time" />
              </div>
            </div>

            <label class="checkbox-row">
              <input id="gerenteAcompanhou" type="checkbox" checked />
              <span>Gerente acompanhou validação</span>
            </label>

            <h2 class="section-title">DEPÓSITO / AÉREO (Itens 1–7)</h2>
            <div id="itemsDeposito"></div>

            <h2 class="section-title">ÁREA DE VENDA (Itens 8–18)</h2>
            <div id="itemsVenda"></div>

            <h2 class="section-title">Itens Informativos (Sem Nota)</h2>
            <div class="field">
              <label>Existem produtos que não deverão ser contados no Inventário?</label>
              <div class="option-group" id="produtosIdentificadosOptions"></div>
            </div>
            <div class="field" style="margin-top: 18px;">
              <label>A quantidade de mercadorias na loja pode inviabilizar ou atrasar o inventário?</label>
              <div class="option-group" id="impactoMercadoriaOptions"></div>
            </div>

            <div style="margin-top: 24px;">
              <button id="exportBtn" class="btn" type="button">Exportar PDF</button>
            </div>
          </div>
        </div>
      </div>

      <div class="sticky-col">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title" style="font-size: 22px;">Resumo Final</h2>
          </div>
          <div class="card-content">
            <div id="statusBox" class="status-box status-bad">
              <div class="status-label">Resultado da avaliação</div>
              <div id="notaFinal" class="status-score">0.0%</div>
              <div id="statusLoja" class="status-text">Reprovada</div>
            </div>

            <div class="summary-grid">
              <div class="summary-tile">
                <div class="summary-tile-label">Áreas avaliadas</div>
                <div id="totalAreas" class="summary-tile-value">0</div>
              </div>
              <div class="summary-tile">
                <div class="summary-tile-label">Não conformes</div>
                <div id="totalNaoConformes" class="summary-tile-value">0</div>
              </div>
            </div>

            <div class="approval-box">
              <div class="approval-title">Faixa de aprovação</div>
              <div class="approval-line">0 a 84,4%: reprovada</div>
              <div class="approval-line">84,5 a 100%: aprovada para inventário</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2 class="card-title" style="font-size: 22px;">Resumo por item</h2>
          </div>
          <div class="card-content">
            <div id="summaryItems" class="scroll-wrap"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ITEMS_SCORABLE = [
      "Depósito/Aéreo: Nos Paletes Mix foi armazenado produtos de uma mesma categoria?",
      "Depósito/Aéreo: Foram eliminadas caixas abertas (incompletas) e/ou contendo diversos itens mesclados?",
      "Depósito/Aéreo: Foram organizados os Paletes de uma mesma categoria no seu corredor?",
      "Depósito: Para os Paletes Full foram organizados com amarração única e placas contendo identificação?",
      "Depósito: Área segregada do PAR foi organizada respeitando agrupamento por códigos?",
      "Depósito/Aéreo: Os Paletes Mix foram organizados separando por códigos?",
      "Depósito/Aéreo: Produtos do aéreo foram organizados respeitando agrupamento por categoria e código?",
      "Área de Venda: Foram eliminadas caixas nas gôndolas?",
      "Área de Venda: Foi organizada a caixaria da última prateleira com descrição voltada para fora?",
      "Área de Venda: Foi reduzido o abastecimento dos produtos de Baixo e Médio Giro em D-5 e produtos de Alto Giro em D-1?",
      "Área de Venda: Mercadorias puxadas para frente facilitando visualização?",
      "Área de Venda: Produtos agrupados por códigos nas prateleiras?",
      "Área de Venda: Foi deixado 1 cm de separação entre grupos?",
      "Área de Venda: Produtos organizados em uma única forma (não misturar posições)?",
      "Área de Venda: Pontas de gôndola organizadas sem unidades soltas e sem fundo falso?",
      "Área de Venda: Produtos em peg board reduzidos e empurrados para trás?",
      "Área de Venda PAR: Garrafas de bebidas em suas embalagens corretas.",
      "Área de Venda PAR: Produtos em vitrines organizados corretamente."
    ];

    const INFORMATIVE_OPTIONS = {
      produtosIdentificados: [
        "Sim, estão identificados",
        "Não existem",
        "Existem, mas NÃO estão identificados corretamente"
      ],
      impactoMercadoria: [
        "Sim, não há espaço para movimentação",
        "Necessidade mão de obra extra",
        "Esta de acordo com o esperado"
      ]
    };

    const STATUS_THRESHOLD = 84.5;

    const state = {
      form: {
        nomeLoja: "",
        visita: "1ª Visita",
        coordArko: "",
        gerenteLoja: "",
        gerenteAcompanhou: true,
        data: new Date().toISOString().slice(0, 10),
        horaVisita: "",
        produtosIdentificados: "",
        impactoMercadoria: ""
      },
      items: ITEMS_SCORABLE.map((description, index) => ({
        id: index + 1,
        description,
        areaAvaliada: "",
        naoConformes: "",
        observacao: ""
      }))
    };

    function clampPercent(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.max(0, Math.min(100, value));
    }

    function formatPercent(value) {
      return `${Number(value || 0).toFixed(1)}%`;
    }

    function sanitizeFileName(name) {
      return (name || "relatorio-avaliacao")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9\-_ ]/g, "")
        .trim()
        .replace(/\s+/g, "-")
        .toLowerCase() || "relatorio-avaliacao";
    }

    function getSummary() {
      let totalAreas = 0;
      let totalNaoConformes = 0;

      const rows = state.items.map((item) => {
        const areaAvaliada = Math.max(0, Number(item.areaAvaliada) || 0);
        const naoConformes = Math.min(Math.max(0, Number(item.naoConformes) || 0), areaAvaliada);
        const itemScore = areaAvaliada > 0
          ? clampPercent(((areaAvaliada - naoConformes) / areaAvaliada) * 100)
          : 0;

        totalAreas += areaAvaliada;
        totalNaoConformes += naoConformes;

        return {
          ...item,
          areaAvaliada,
          naoConformes,
          itemScore
        };
      });

      const notaFinal = totalAreas > 0
        ? clampPercent(((totalAreas - totalNaoConformes) / totalAreas) * 100)
        : 0;

      return {
        rows,
        totalAreas,
        totalNaoConformes,
        notaFinal,
        itensCriticos: rows.filter((row) => row.naoConformes > 0).length,
        statusLoja: notaFinal >= STATUS_THRESHOLD ? "Aprovada para inventário" : "Reprovada",
        statusGood: notaFinal >= STATUS_THRESHOLD
      };
    }

    function renderOptionButtons(containerId, key, options) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      options.forEach((label) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `option-button${state.form[key] === label ? " active" : ""}`;
        btn.textContent = label;
        btn.addEventListener("click", () => {
          state.form[key] = label;
          render();
        });
        container.appendChild(btn);
      });
    }

    function createItemCard(item) {
      const wrapper = document.createElement("div");
      wrapper.className = "item-card";
      wrapper.innerHTML = `
        <div class="item-top">
          <span class="badge">Item ${item.id}</span>
          <span class="score-text">${formatPercent(item.itemScore)}</span>
        </div>
        <p class="item-description">${item.description}</p>
        <div class="grid-2">
          <div class="field">
            <label>Áreas avaliadas</label>
            <input type="number" min="0" value="${item.areaAvaliada ?? ""}" data-id="${item.id}" data-field="areaAvaliada" />
          </div>
          <div class="field">
            <label>Áreas não conformes</label>
            <input type="number" min="0" value="${item.naoConformes ?? ""}" data-id="${item.id}" data-field="naoConformes" />
          </div>
        </div>
        <div class="field" style="margin-top: 12px;">
          <textarea placeholder="Observações" data-id="${item.id}" data-field="observacao">${escapeHtml(item.observacao || "")}</textarea>
        </div>
      `;
      return wrapper;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderItems(summary) {
      const deposito = document.getElementById("itemsDeposito");
      const venda = document.getElementById("itemsVenda");
      deposito.innerHTML = "";
      venda.innerHTML = "";

      summary.rows.slice(0, 7).forEach((item) => deposito.appendChild(createItemCard(item)));
      summary.rows.slice(7, 18).forEach((item) => venda.appendChild(createItemCard(item)));
    }

    function renderSummary(summary) {
      document.getElementById("notaFinal").textContent = formatPercent(summary.notaFinal);
      document.getElementById("statusLoja").textContent = summary.statusLoja;
      document.getElementById("totalAreas").textContent = summary.totalAreas;
      document.getElementById("totalNaoConformes").textContent = summary.totalNaoConformes;

      const statusBox = document.getElementById("statusBox");
      statusBox.className = `status-box ${summary.statusGood ? "status-good" : "status-bad"}`;

      const summaryItems = document.getElementById("summaryItems");
      summaryItems.innerHTML = "";

      summary.rows.forEach((item) => {
        const card = document.createElement("div");
        const scoreClass = item.itemScore >= STATUS_THRESHOLD ? "status-good" : "status-bad";
        card.className = "item-summary-card";
        card.innerHTML = `
          <div class="item-summary-top">
            <div>
              <div class="item-summary-id">Item ${item.id}</div>
              <div class="item-summary-desc">${item.description}</div>
            </div>
            <div class="item-summary-score ${scoreClass}">
              <div>Nota</div>
              <div style="font-size: 14px; margin-top: 4px;">${formatPercent(item.itemScore)}</div>
            </div>
          </div>
        `;
        summaryItems.appendChild(card);
      });
    }

    function bindStaticFields() {
      const bindings = [
        ["nomeLoja", "nomeLoja", "value"],
        ["visita", "visita", "value"],
        ["coordArko", "coordArko", "value"],
        ["gerenteLoja", "gerenteLoja", "value"],
        ["data", "data", "value"],
        ["horaVisita", "horaVisita", "value"],
      ];

      bindings.forEach(([id, key, prop]) => {
        const el = document.getElementById(id);
        el[prop] = state.form[key];
        el.addEventListener("input", (e) => {
          state.form[key] = e.target[prop];
        });
      });

      const gerente = document.getElementById("gerenteAcompanhou");
      gerente.checked = state.form.gerenteAcompanhou;
      gerente.addEventListener("change", (e) => {
        state.form.gerenteAcompanhou = e.target.checked;
      });

      document.getElementById("exportBtn").addEventListener("click", exportPDF);
    }

    function bindDynamicItemFields() {
      document.querySelectorAll("[data-id][data-field]").forEach((el) => {
        const eventName = el.tagName === "TEXTAREA" ? "input" : "input";
        el.addEventListener(eventName, (e) => {
          const id = Number(e.target.getAttribute("data-id"));
          const field = e.target.getAttribute("data-field");
          const item = state.items.find((row) => row.id === id);
          if (!item) return;
          item[field] = e.target.value;
          renderSummary(getSummary());
          if (field === "areaAvaliada" || field === "naoConformes") {
            refreshVisibleScores();
          }
        });
      });
    }

    function refreshVisibleScores() {
      const summary = getSummary();
      const scoreTexts = document.querySelectorAll(".score-text");
      summary.rows.forEach((row, index) => {
        if (scoreTexts[index]) scoreTexts[index].textContent = formatPercent(row.itemScore);
      });
    }

    function render() {
      const summary = getSummary();
      renderItems(summary);
      renderOptionButtons("produtosIdentificadosOptions", "produtosIdentificados", INFORMATIVE_OPTIONS.produtosIdentificados);
      renderOptionButtons("impactoMercadoriaOptions", "impactoMercadoria", INFORMATIVE_OPTIONS.impactoMercadoria);
      renderSummary(summary);
      bindDynamicItemFields();
    }

    function exportPDF() {
      try {
        const { jsPDF } = window.jspdf;
        const summary = getSummary();
        const doc = new jsPDF({ unit: "mm", format: "a4" });
        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const marginX = 12;
        const bottomMargin = 24;
        const contentWidth = pageWidth - marginX * 2;
        let y = 14;

        const drawHeader = () => {
          doc.setFont("helvetica", "bold");
          doc.setFontSize(14);
          doc.text("Relatório de Avaliação de Inventário", pageWidth / 2, 16, { align: "center" });
          doc.setDrawColor(210);
          doc.line(marginX, 22, pageWidth - marginX, 22);
          y = 28;
        };

        const drawFooter = () => {
          const footerY = pageHeight - 18;
          const lineWidth = 65;

          doc.setDrawColor(120);
          doc.line(marginX, footerY, marginX + lineWidth, footerY);
          doc.line(pageWidth - marginX - lineWidth, footerY, pageWidth - marginX, footerY);

          doc.setFont("helvetica", "normal");
          doc.setFontSize(9);
          doc.text("Assinatura Arko", marginX + lineWidth / 2, footerY + 5, { align: "center" });
          doc.text("Assinatura Cliente", pageWidth - marginX - lineWidth / 2, footerY + 5, { align: "center" });
        };

        const ensureSpace = (needed = 10) => {
          if (y + needed > pageHeight - bottomMargin) {
            drawFooter();
            doc.addPage();
            drawHeader();
          }
        };

        const writeWrapped = (label, value = "-", indent = 0, gap = 5) => {
          const safeText = `${label}${value || "-"}`;
          const lines = doc.splitTextToSize(safeText, contentWidth - indent);
          ensureSpace(lines.length * gap + 2);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.text(lines, marginX + indent, y);
          y += lines.length * gap + 2;
        };

        const writeSectionTitle = (title) => {
          ensureSpace(8);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(11);
          doc.text(title, marginX, y);
          y += 6;
        };

        drawHeader();

        writeSectionTitle("Dados Gerais");
        writeWrapped("Loja: ", state.form.nomeLoja);
        writeWrapped("Visita: ", state.form.visita);
        writeWrapped("Coordenador Arko: ", state.form.coordArko);
        writeWrapped("Gerente da Loja: ", state.form.gerenteLoja);
        writeWrapped("Gerente acompanhou validação: ", state.form.gerenteAcompanhou ? "Sim" : "Não");
        writeWrapped("Data: ", state.form.data);
        writeWrapped("Hora da visita: ", state.form.horaVisita);

        writeSectionTitle("Resumo Final");
        writeWrapped("Nota final: ", formatPercent(summary.notaFinal));
        writeWrapped("Status: ", summary.statusLoja);
        writeWrapped("Áreas avaliadas: ", String(summary.totalAreas));
        writeWrapped("Áreas não conformes: ", String(summary.totalNaoConformes));
        writeWrapped("Itens com não conformidade: ", String(summary.itensCriticos));

        writeSectionTitle("Itens Avaliados");
        summary.rows.forEach((row) => {
          ensureSpace(28);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(10);
          doc.text(`Item ${row.id} — ${formatPercent(row.itemScore)}`, marginX, y);
          y += 5;
          writeWrapped("Descrição: ", row.description, 2);
          writeWrapped("Áreas avaliadas: ", String(row.areaAvaliada), 2);
          writeWrapped("Áreas não conformes: ", String(row.naoConformes), 2);
          writeWrapped("Observações: ", row.observacao, 2);
          y += 2;
        });

        writeSectionTitle("Itens Informativos (Sem Nota)");
        writeWrapped("Existem produtos que não deverão ser contados no Inventário? ", state.form.produtosIdentificados);
        writeWrapped("A quantidade de mercadorias na loja pode inviabilizar ou atrasar o inventário? ", state.form.impactoMercadoria);

        drawFooter();
        doc.save(`${sanitizeFileName(state.form.nomeLoja)}.pdf`);
      } catch (error) {
        console.error("Erro ao exportar PDF:", error);
        alert("Não foi possível gerar o PDF. Tente novamente após preencher os dados.");
      }
    }

    bindStaticFields();
    render();
  </script>
</body>
</html>
